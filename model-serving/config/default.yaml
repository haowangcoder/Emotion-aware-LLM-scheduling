# ============================================================================
# Affect-Aware LLM Scheduling - Default Configuration
# ============================================================================
# AW-SSJF (Affect-Weighted Shortest-Service-Job-First) Framework
#
# Core Innovation:
#   - Service time S predicted by BERT model (not emotion-based)
#   - Affect weight w computed using Depression-First strategy
#   - Scheduling score = S / w (lower = higher priority)
#
# Configuration precedence: default.yaml -> environment variables -> CLI args

# ============================================================================
# WORKLOAD GENERATION
# ============================================================================
workload:
  service_time:
    base_service_time: 2.0       # Default service time when predictor unavailable
    min_service_time: 0.1        # Minimum allowed service time

  emotion:
    arousal_noise_std: 0.0       # Noise added to arousal values (NRC-VAD)
    valence_noise_std: 0.0       # Noise added to valence values (NRC-VAD)
    enable_emotion_aware: true   # Enable emotion-aware features
    use_stratified_sampling: true  # Stratified sampling by Russell quadrant
    quadrant_distribution: uniform  # 'uniform' or dict with 4 quadrants

# ============================================================================
# LLM INFERENCE CONFIGURATION
# ============================================================================
llm:
  model:
    name: 'lmsys/vicuna-13b-v1.3'
    device_map: 'auto'
    dtype: 'auto'
    trust_remote_code: true
    load_in_8bit: false

  generation:
    max_new_tokens: 512
    temperature: 0.0
    top_p: 0.0
    do_sample: false
    repetition_penalty: 1.1

  prompt:
    include_system_prompt: false
    include_emotion_hint: false
    max_conversation_turns: 1

  cache:
    use_response_cache: true
    cache_dir: null              # Set by config_loader
    cache_file: 'responses.json'
    force_regenerate: false
    use_saved_job_config: true
    job_config_file: 'job_configs.json'
    force_new_job_config: false

  error_handling:
    max_retries: 1
    enable_cpu_fallback: false
    skip_on_error: true

# ============================================================================
# SCHEDULER CONFIGURATION
# ============================================================================
scheduler:
  # Available algorithms:
  #   - FCFS: First-Come-First-Serve (baseline)
  #   - SJF: Shortest-Job-First (uses predicted service time)
  #   - SSJF: Speculative SJF (same as SJF for now)
  #   - AW-SSJF: Affect-Weighted SSJF (main algorithm)
  #   - Weight-Only: Pure affect-based priority (ablation baseline)
  algorithm: 'FCFS'

  system_load: 0.6               # Target system load (rho)

  # Starvation Prevention
  starvation_prevention:
    threshold: .inf              # Absolute time threshold (inf = disabled)
    coefficient: 3.0             # Relative threshold (multiple of service time)

  # Affect Weight Parameters (Depression-First Strategy)
  # Weight formula: w = 1 + (w_max - 1) * c * u
  # Urgency formula: u = max(0,-v)^p * max(0,-a)^q
  affect_weight:
    w_max: 2.0                   # Maximum weight [1.2, 3.0] recommended
    p: 1.0                       # Exponent for negative valence
    q: 1.0                       # Exponent for low arousal
    use_confidence: true         # Apply confidence discount

# ============================================================================
# LENGTH PREDICTOR CONFIGURATION (BERT-based)
# ============================================================================
length_predictor:
  enabled: true                 # Disabled by default (requires trained model)
  model_path: 'predictor/models/bert_regression.pth'
  model_name: 'bert-base-uncased'
  device: 'cuda'
  per_token_latency: 0.02        # Latency per generated token (seconds)
  const_latency: 0.1             # Constant latency overhead (seconds)
  default_service_time: 2.0      # Fallback when predictor unavailable

# ============================================================================
# DATASET AND EXPERIMENT
# ============================================================================
dataset:
  emotion_dataset_path: './dataset'

experiment:
  mode: 'fixed_jobs'             # 'fixed_jobs' or 'time_window'
  num_jobs: 50
  simulation_duration: 300.0
  random_seed: 42
  fairness_metric: 'waiting_time'
  calculate_fairness: true

# ============================================================================
# OUTPUT AND LOGGING
# ============================================================================
output:
  results_dir: 'results/llm_runs/'
  verbose: true

# ============================================================================
# CONFIGURATION NOTES
# ============================================================================
# 1. AW-SSJF SCHEDULING MODEL:
#    Score_i = S_i / w_i (lower = higher priority)
#    - S_i: Predicted service time (from BERT or default)
#    - w_i: Affect weight (Depression-First)
#
# 2. DEPRESSION-FIRST STRATEGY:
#    Only users with BOTH negative valence AND low arousal get priority boost.
#    - Excited users (high valence, high arousal): w = 1 (no boost)
#    - Calm users (high valence, low arousal): w = 1 (no boost)
#    - Panic users (low valence, high arousal): w = 1 (no boost)
#    - Depression users (low valence, low arousal): w > 1 (priority boost)
#
# 3. RUSSELL QUADRANT SAMPLING:
#    Uses stratified sampling by Russell's 4 quadrants for fair comparison:
#    - excited: V >= 0, A >= 0
#    - calm: V >= 0, A < 0
#    - panic: V < 0, A >= 0
#    - depression: V < 0, A < 0
#
# 4. BERT LENGTH PREDICTOR:
#    Service time = const_latency + predicted_tokens * per_token_latency
#    Train the model separately using the output-token-len-prediction module.
