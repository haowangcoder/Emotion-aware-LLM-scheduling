# ============================================================================
# Affect-Aware LLM Scheduling - Default Configuration
# ============================================================================
# AW-SSJF (Affect-Weighted Shortest-Service-Job-First) Framework
#
# Core Innovation:
#   - Service time S predicted by BERT model (not emotion-based)
#   - Affect weight w computed using Depression-First strategy
#   - Scheduling score = S / w (lower = higher priority)
#
# Configuration precedence: default.yaml -> environment variables -> CLI args

# ============================================================================
# WORKLOAD GENERATION
# ============================================================================
workload:
  service_time:
    base_service_time: 2.0       # Default service time when predictor unavailable
    min_service_time: 0.1        # Minimum allowed service time

  emotion:
    arousal_noise_std: 0.0       # Noise added to arousal values (NRC-VAD)
    valence_noise_std: 0.0       # Noise added to valence values (NRC-VAD)
    enable_emotion_aware: true   # Enable emotion-aware features
    use_stratified_sampling: true  # Stratified sampling by Russell quadrant
    quadrant_distribution: uniform  # 'uniform' or dict with 4 quadrants

# ============================================================================
# LLM INFERENCE CONFIGURATION
# ============================================================================
llm:
  model:
    name: 'meta-llama/Meta-Llama-3-8B-Instruct'
    device_map: 'auto'
    dtype: 'auto'
    trust_remote_code: true
    load_in_8bit: false

  generation:
    max_new_tokens: 512
    temperature: 0.0
    top_p: 0.0
    do_sample: false
    repetition_penalty: 1.1

  prompt:
    include_system_prompt: false
    include_emotion_hint: false
    max_conversation_turns: 1

  cache:
    use_response_cache: true
    cache_dir: null              # Set by config_loader
    cache_file: 'responses.json'
    force_regenerate: false
    use_saved_job_config: true
    job_config_file: 'job_configs.json'
    force_new_job_config: false

  error_handling:
    max_retries: 1
    enable_cpu_fallback: false
    skip_on_error: true

# ============================================================================
# SCHEDULER CONFIGURATION
# ============================================================================
scheduler:
  # Available algorithms:
  #   - FCFS: First-Come-First-Serve (baseline)
  #   - SJF: Shortest-Job-First (uses predicted service time)
  #   - SSJF: Speculative SJF (same as SJF for now)
  #   - AW-SSJF: Affect-Weighted SSJF (main algorithm)
  #   - Weight-Only: Pure affect-based priority (ablation baseline)
  algorithm: 'FCFS'

  system_load: 0.6               # Target system load (rho)

  # Robust Scoring (for prediction error tolerance)
  # When enabled, uses log(S+1)/w instead of S/w to reduce sensitivity
  # to service time prediction errors from BERT model
  use_robust_scoring: false

  # Conservative Prediction (for underestimation protection)
  # When enabled, multiplies predicted service time by margin before scoring
  # This reduces impact of BERT underestimating long responses
  use_conservative_prediction: false
  conservative_margin: 1.3           # 1.3 = 30% safety margin

  # Weight Exponent (for amplifying affect weight influence)
  # Score = S / w^k where k = weight_exponent
  # k=1: standard WSPT (service time dominates)
  # k=2: squared weights (recommended, balances S and w influence)
  # k=3+: stronger weight influence (may hurt efficiency)
  weight_exponent: 4.0               # 2.0 = squared weights (w² amplification)

  # Starvation Prevention
  starvation_prevention:
    threshold: .inf              # Absolute time threshold (inf = disabled)
    coefficient: 3.0             # Relative threshold (multiple of service time)

  # Affect Weight Parameters (Depression-First + Panic-Second Strategy)
  # v1.0 formula: w = 1 + (w_max - 1) * c * u, where u = max(0,-v)^p * max(0,-a)^q
  # v2.0 adds: SOFT mode (sigmoid gating) and DUAL_CHANNEL (Depression + Panic)
  affect_weight:
    # Weight mode: 'hard' (v1.0), 'soft' (single channel), 'dual' (Depression + Panic)
    # Or use preset: 'depression_first_hard', 'depression_first_soft',
    #                'dual_channel_balanced', 'dual_channel_depression_heavy'
    weight_mode: 'dual_channel_balanced'          # 'hard', 'soft', 'dual', or preset name
    w_max: 2.0                   # Maximum weight [1.2, 3.0] recommended
    p: 1.0                       # Exponent for negative valence
    q: 1.0                       # Exponent for low arousal
    use_confidence: true         # Apply confidence discount

    # v2.0 Soft gating parameters (for 'soft' and 'dual' modes)
    k_v: 5.0                     # Sigmoid steepness for valence
    k_a: 5.0                     # Sigmoid steepness for arousal
    tau_v: 0.0                   # Threshold for negative valence
    tau_a: 0.0                   # Threshold for low arousal

    # v2.0 Dual-channel parameters (for 'dual' mode only)
    r: 1.0                       # Exponent for high arousal (panic)
    tau_h: 0.0                   # Threshold for high arousal
    gamma_dep: 1.0               # Depression channel weight
    gamma_panic: 0.3             # Panic channel weight (lower = less priority)

# ============================================================================
# LENGTH PREDICTOR CONFIGURATION (BERT Bucket Classification)
# ============================================================================
# Uses expected value method: T_mean = sum(q_i * m_i)
# Service time: S = const_latency + T_mean * per_token_latency
length_predictor:
  enabled: true                  # Enable BERT bucket predictor
  model_path: 'predictor/models/bert_bucket'  # HuggingFace model directory
  bin_edges_path: 'predictor/models/bin_edges.npy'  # Bin edges file
  model_name: 'distilbert-base-uncased'
  device: 'cuda'
  num_bins: 5                    # Number of classification bins
  per_token_latency: 0.02        # c_1: Latency per generated token (seconds)
  const_latency: 0.1             # c_0: Constant latency overhead (seconds)
  default_service_time: 2.0      # Fallback when predictor unavailable

# ============================================================================
# DATASET AND EXPERIMENT
# ============================================================================
dataset:
  emotion_dataset_path: './dataset'

experiment:
  mode: 'fixed_jobs'             # 'fixed_jobs' or 'time_window'
  num_jobs: 50
  simulation_duration: 300.0
  random_seed: 42
  fairness_metric: 'waiting_time'
  calculate_fairness: true

# ============================================================================
# OUTPUT AND LOGGING
# ============================================================================
output:
  results_dir: 'results/llm_runs/'
  verbose: true

# ============================================================================
# CONFIGURATION NOTES
# ============================================================================
# 1. AW-SSJF SCHEDULING MODEL:
#    Score_i = S_i / w_i (lower = higher priority)
#    - S_i: Predicted service time (from BERT or default)
#    - w_i: Affect weight (Depression-First)
#
# 2. DEPRESSION-FIRST STRATEGY (v1.0 HARD mode):
#    Only users with BOTH negative valence AND low arousal get priority boost.
#    - Excited users (high valence, high arousal): w = 1 (no boost)
#    - Calm users (high valence, low arousal): w = 1 (no boost)
#    - Panic users (low valence, high arousal): w = 1 (no boost)
#    - Depression users (low valence, low arousal): w > 1 (priority boost)
#
# 3. v2.0 WEIGHT MODES:
#    - HARD: Original hard gating max(0,-x), discontinuous at 0
#    - SOFT: Sigmoid gating (recommended), smooth and noise-robust
#      * n = sigmoid(k_v * (-v - tau_v))
#      * ell = sigmoid(k_a * (-a - tau_a))
#      * u = n^p * ell^q
#    - DUAL_CHANNEL: Depression-First + Panic-Second
#      * u_dep = n^p * ell^q (depression urgency)
#      * u_panic = n^p * h^r (panic urgency)
#      * u = gamma_dep * u_dep + gamma_panic * u_panic
#      * Panic users now get limited priority boost (gamma_panic ~ 0.3)
#
# 4. RUSSELL QUADRANT SAMPLING:
#    Uses stratified sampling by Russell's 4 quadrants for fair comparison:
#    - excited: V >= 0, A >= 0
#    - calm: V >= 0, A < 0
#    - panic: V < 0, A >= 0
#    - depression: V < 0, A < 0
#
# 5. BERT BUCKET LENGTH PREDICTOR:
#    Uses classification into bins + expected value method:
#    - T_mean = sum(q_i * m_i) where q_i is softmax prob, m_i is bin midpoint
#    - Service time = const_latency + T_mean * per_token_latency
#    Train using predictor/training scripts (prepare_data.py, train.py).
#
# 6. ROBUST SCORING (use_robust_scoring: true):
#    Uses log(S+1)/w instead of S/w to reduce sensitivity to prediction errors.
#    Benefits:
#    - Compresses extreme prediction values (large errors have less impact)
#    - Short jobs still get priority, but less aggressively
#    - Mathematical: |log(a) - log(b)| < |a - b| for large values
#    Example: predicted=1.5s, actual=10s
#    - Standard: error ratio = 10/1.5 = 6.7x
#    - Robust: error ratio = log(11)/log(2.5) = 2.6x (much smaller impact)
#
# 7. CONSERVATIVE PREDICTION (use_conservative_prediction: true):
#    Multiplies predicted service time by conservative_margin before scoring.
#    Benefits:
#    - Reduces SJF "priority inversion" when BERT underestimates long responses
#    - Combined with robust scoring provides double protection
#    Example: conservative_margin=1.3 (30% safety margin)
#    - Predicted 1.5s -> used as 1.95s for scheduling
#    - Long jobs get slightly lower priority, reducing queue blocking
